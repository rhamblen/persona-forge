# Persona Forge stack.
#
# TWO WAYS TO RUN THIS:
#
#  A) Source build (current default).  Requires the WHOLE repo on UR1, because the
#     build context is the repo root. Copy the whole project folder to
#     /mnt/user/appdata/persona-forge/ and point Docker Compose Manager at
#     .../persona-forge/docker/docker-compose.yml
#
#  B) Prebuilt image (preferred once we publish to GHCR).  Set PF_IMAGE in .env to
#     e.g. ghcr.io/rhamblen/persona-forge:0.2.0, comment out the `build:` block
#     below, and then only this docker/ folder + appdata/ need to be copied —
#     matching the blender-mcp / comfyui-mcp pattern.

services:
  persona-forge:
    image: ${PF_IMAGE:-persona-forge:local}
    # --- comment out this build block when using a prebuilt PF_IMAGE ---
    build:
      context: ..
      dockerfile: backend/Dockerfile
    # -------------------------------------------------------------------
    container_name: persona-forge
    restart: unless-stopped
    ports:
      - "${PF_PORT:-8890}:8000"
    environment:
      COMFYUI_URL: "${COMFYUI_URL:-http://192.168.1.33:9000}"
      BUILDS_ROOT: "/builds"
      APPDATA_ROOT: "/appdata"
      TZ: "${TZ:-Europe/London}"
    volumes:
      # Persistent app data (sqlite db, config).
      # Relative paths resolve against THIS file's folder (docker/).
      - type: bind
        source: ${APPDATA_HOST_PATH:-../appdata}
        target: /appdata

      # SHARED builds folder — MUST be the same host path mapped into the ComfyUI
      # container as /builds. Long-form bind syntax avoids the short "a:b" form's
      # problems with awkward paths.
      - type: bind
        source: ${BUILDS_HOST_PATH:?set BUILDS_HOST_PATH in docker/.env}
        target: /builds
